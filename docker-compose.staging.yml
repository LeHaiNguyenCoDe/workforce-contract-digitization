version: '3.9'

services:
  app:
    image: ghcr.io/workforce-contract-digitization:staging-latest
    container_name: workforce-staging-app
    restart: unless-stopped
    working_dir: /app
    environment:
      - APP_ENV=staging
      - APP_DEBUG=false
      - APP_URL=${STAGING_APP_URL:-http://staging.workforce-contract.local}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-workforce_staging}
      - DB_USERNAME=${DB_USERNAME:-staging_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAIL_DRIVER=smtp
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/storage/logs
    depends_on:
      - mysql
      - redis
    networks:
      - staging-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mysql:
    image: mysql:8.0
    container_name: workforce-staging-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-workforce_staging}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME:-staging_user}
    ports:
      - "3307:3306"
    volumes:
      - mysql-staging-data:/var/lib/mysql
      - ./docker/mysql/staging.cnf:/etc/mysql/conf.d/staging.cnf
    networks:
      - staging-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: workforce-staging-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-staging-data:/data
    networks:
      - staging-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: workforce-staging-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./public:/app/public
      - ./docker/nginx/staging.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - staging-network

volumes:
  mysql-staging-data:
    driver: local
  redis-staging-data:
    driver: local

networks:
  staging-network:
    driver: bridge

