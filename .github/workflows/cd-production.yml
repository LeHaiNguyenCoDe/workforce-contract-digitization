name: CD - Main Branch (Build & Deploy to Production)

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CACHE_VERSION: v1

jobs:
  build-frontend:
    name: Build Frontend (Vue.js + Vite)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 💾 Cache node_modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-${{ env.CACHE_VERSION }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🏗️ Build Frontend (Production)
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          NODE_ENV: production

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-prod
          path: dist/
          retention-days: 1

  build-backend:
    name: Build Backend (Laravel)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, bcmath, ctype, fileinfo, json, tokenizer, xml

      - name: 💾 Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}-${{ env.CACHE_VERSION }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: 📚 Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: 🔧 Setup Laravel environment
        run: |
          cp .env.example .env.production
          php artisan key:generate --env=production

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist-prod
          path: |
            app/
            bootstrap/
            config/
            database/
            public/
            resources/
            routes/
            storage/
            vendor/
            .env.production
            artisan
          retention-days: 1

  build-docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-prod
          path: public/

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=prod-
            type=raw,value=production-latest

      - name: 🐳 Build & Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    name: Deploy to Production (Manual Approval)
    runs-on: ubuntu-latest
    needs: build-docker
    
    environment:
      name: production
      url: https://workforce-contract.com

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⏳ Wait for approval
        run: echo "✅ Production deployment approved!"

      - name: 🔐 Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PRODUCTION_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: 📋 Create deployment script
        run: |
          cat > deploy-prod.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "🚀 Starting Production Deployment..."
          
          # Backup current deployment
          cd /var/www/workforce-contract-prod
          cp -r . ../workforce-contract-prod-backup-$(date +%Y%m%d-%H%M%S)
          
          # Pull latest code
          git pull origin main
          
          # Pull Docker image
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production-latest
          
          # Stop old container (graceful shutdown)
          docker-compose -f docker-compose.production.yml down || true
          
          # Start new container
          docker-compose -f docker-compose.production.yml up -d
          
          # Run migrations
          docker-compose -f docker-compose.production.yml exec -T app php artisan migrate --force
          
          # Clear caches
          docker-compose -f docker-compose.production.yml exec -T app php artisan cache:clear
          docker-compose -f docker-compose.production.yml exec -T app php artisan config:clear
          
          # Health check
          sleep 5
          if curl -f http://localhost/health; then
            echo "✅ Production deployment completed successfully!"
          else
            echo "❌ Health check failed, rolling back..."
            exit 1
          fi
          EOF
          
          chmod +x deploy-prod.sh

      - name: 🚀 Execute production deployment
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.PRODUCTION_SERVER_USER }}@${{ secrets.PRODUCTION_SERVER_HOST }} \
            "bash -s" < deploy-prod.sh

      - name: 🔔 Notify Slack - Success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Production Deployment Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ Production Deployment Successful*\n*Branch:* main\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}\n*Tag:* ${{ github.ref }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: 🔔 Notify Slack - Failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Production Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Production Deployment Failed*\n*Branch:* main\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

