version: '3.9'

services:
  app:
    image: ghcr.io/workforce-contract-digitization:production-latest
    container_name: workforce-prod-app
    restart: always
    working_dir: /app
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${PRODUCTION_APP_URL:-https://workforce-contract.com}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-workforce_prod}
      - DB_USERNAME=${DB_USERNAME:-prod_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAIL_DRIVER=smtp
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - LOG_CHANNEL=stack
      - LOG_LEVEL=error
    ports:
      - "9000:9000"
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/storage/logs
    depends_on:
      - mysql
      - redis
    networks:
      - production-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  mysql:
    image: mysql:8.0
    container_name: workforce-prod-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-workforce_prod}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME:-prod_user}
    ports:
      - "3306:3306"
    volumes:
      - mysql-prod-data:/var/lib/mysql
      - ./docker/mysql/production.cnf:/etc/mysql/conf.d/production.cnf
      - ./docker/mysql/backup:/backup
    networks:
      - production-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: workforce-prod-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-prod-data:/data
    networks:
      - production-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: workforce-prod-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./public:/app/public:ro
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - production-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  backup:
    image: mysql:8.0
    container_name: workforce-prod-backup
    restart: always
    environment:
      MYSQL_PWD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./docker/mysql/backup:/backup
      - ./docker/scripts/backup.sh:/backup.sh:ro
    entrypoint: /bin/bash
    command: -c "while true; do /backup.sh; sleep 86400; done"
    depends_on:
      - mysql
    networks:
      - production-network

volumes:
  mysql-prod-data:
    driver: local
  redis-prod-data:
    driver: local

networks:
  production-network:
    driver: bridge

